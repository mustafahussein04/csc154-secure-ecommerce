<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout — Buy me a drink</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <nav class="nav">
    <a href="/index.html" class="brand"><span class="mark"></span>Buy me a drink</a>
    <div class="nav-links">
      <a href="/index.html">Home</a>
      <a href="/products.html">Products</a>
    </div>
  </nav>
  <div class="status-strip state-guest" id="status-strip">
    <span class="dot"></span><span>checking session…</span>
  </div>

  <main style="max-width: 560px;">
    <p class="eyebrow">Complete your order</p>
    <h2>Checkout</h2>

    <div class="steps">
      <div class="step done"><span class="num">1</span> Cart</div>
      <div class="step active"><span class="num">2</span> Review</div>
      <div class="step"><span class="num">3</span> Confirm</div>
    </div>

    <div class="card boxed">
      <div id="cart-summary" class="muted" style="margin-bottom:1rem;"></div>
      <button id="place-order-btn">Place order</button>
      <p class="msg" id="msg"></p>
    </div>

    <hr class="divider" />

    <h3>Your orders</h3>
    <div class="card boxed" id="orders-list"></div>
  </main>

  <script src="/js/main.js"></script>
  <script src="/js/checkout.js"></script>
</body>
</html>
