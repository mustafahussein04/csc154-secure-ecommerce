<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout — Coffer</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <nav class="nav">
    <a href="/index.html" class="brand"><span class="mark"></span>Coffer</a>
    <div class="nav-links">
      <a href="/index.html">Home</a>
      <a href="/products.html">Products</a>
    </div>
  </nav>
  <div class="status-strip state-guest" id="status-strip">
    <span class="dot"></span><span>checking session…</span>
  </div>

  <main style="max-width: 560px;">
    <p class="eyebrow">Complete your order</p>
    <h2>Checkout</h2>

    <div class="steps">
      <div class="step done"><span class="num">1</span> Cart</div>
      <div class="step active"><span class="num">2</span> Review</div>
      <div class="step"><span class="num">3</span> Confirm</div>
    </div>

    <div class="card boxed">
      <div id="cart-summary" class="muted" style="margin-bottom:1rem;"></div>
      <button id="place-order-btn">Place order</button>
      <p class="msg" id="msg"></p>
    </div>

    <hr class="divider" />

    <h3>Your orders</h3>
    <div class="card boxed" id="orders-list"></div>
  </main>

  <script src="/js/main.js"></script>
  <script>
    const cart = JSON.parse(localStorage.getItem('demo_cart') || '[]');
    document.getElementById('cart-summary').textContent =
      cart.length ? `${cart.length} item(s) in cart, ready to review.` : 'Cart is empty — add items from the Products page.';

    document.getElementById('place-order-btn').addEventListener('click', async () => {
      const msg = document.getElementById('msg');
      if (cart.length === 0) return showMessage(msg, 'Cart is empty.', true);
      try {
        const data = await apiFetch('/api/cart/checkout', {
          method: 'POST',
          body: JSON.stringify({ items: cart })
        });
        showMessage(msg, `Order #${data.orderId} placed successfully.`);
        localStorage.removeItem('demo_cart');
        document.getElementById('cart-summary').textContent = 'Cart is empty — add items from the Products page.';
        loadOrders();
      } catch (err) {
        showMessage(msg, err.message, true);
      }
    });

    async function loadOrders() {
      const list = document.getElementById('orders-list');
      try {
        const orders = await apiFetch('/api/cart/orders');
        list.innerHTML = orders.length
          ? orders.map(o => `
              <div class="order-row">
                <span class="oid">#${o.id}</span>
                <span class="badge">${o.status}</span>
                <span class="ototal">$${(o.total_cents / 100).toFixed(2)}</span>
              </div>`).join('')
          : '<p class="muted" style="margin:0;">No orders yet.</p>';
      } catch (err) {
        list.innerHTML = '<p class="muted" style="margin:0;">Log in to view your orders.</p>';
      }
    }
    loadOrders();
  </script>
</body>
</html>
