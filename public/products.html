<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Products — Buy me a drink</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <nav class="nav">
    <a href="/index.html" class="brand"><span class="mark"></span>Buy me a drink</a>
    <div class="nav-links">
      <a href="/index.html">Home</a>
      <a href="/checkout.html">Checkout</a>
      <a href="/login.html">Log in</a>
    </div>
  </nav>
  <div class="status-strip state-guest" id="status-strip">
    <span class="dot"></span><span>checking session…</span>
  </div>

  <main>
    <p class="eyebrow">Browse</p>
    <h2>Products</h2>

    <div style="max-width:340px; margin-bottom:1.8rem;">
      <input type="text" id="search" placeholder="Search products…" />
    </div>

    <div class="product-grid" id="product-grid"></div>

    <div class="card boxed" id="merchant-panel" style="display:none; margin-top:2.5rem; max-width:480px;">
      <p class="eyebrow" style="margin-top:0;">Merchant tools</p>
      <h3>Add a product</h3>
      <form id="add-product-form">
        <label>
          <span class="label-text">Name</span>
          <input type="text" id="p-name" required />
        </label>
        <label>
          <span class="label-text">Description</span>
          <textarea id="p-desc"></textarea>
        </label>
        <label>
          <span class="label-text">Price (cents)</span>
          <input type="number" id="p-price" required min="0" />
        </label>
        <label>
          <span class="label-text">Stock</span>
          <input type="number" id="p-stock" required min="0" />
        </label>
        <button type="submit">Add product</button>
        <p class="msg" id="add-msg"></p>
      </form>
    </div>
  </main>

  <script src="/js/main.js"></script>
  <script src="/js/products.js"></script>
</body>
</html>
